[phases.setup]
nixPkgs = ["nodejs_24"]

[phases.install]
cmds = ["corepack enable && corepack prepare pnpm@10 --activate && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
