[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@10.11.0 && pnpm install --frozen-lockfile --ignore-scripts"]

[phases.build]
cmds = ["pnpm --filter @workspace/db run generate 2>/dev/null || true", "pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
