[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm@10 && export PATH=$(npm prefix -g)/bin:$PATH && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
